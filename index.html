<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }
button { padding:10px; font-size:14px; }
</style>
</head>

<body>

<div id="map"></div>

<script>
const stops = [
  { title:"Start", lat:48.4665, lng:8.4126, text:"Willkommen in Freudenstadt" },
  { title:"Marktplatz", lat:48.4667, lng:8.4130, text:"Größter Marktplatz Deutschlands" }
];

const map = L.map('map').setView([48.4665,8.4126], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ""
}).addTo(map);

// AUDIO (API-basierter Call)
async function speak(text){
  const res = await fetch("/api/tts", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const audio = new Audio(url);
  audio.play();
}

// MARKER
stops.forEach(s=>{
  L.marker([s.lat,s.lng]).addTo(map)
    .bindPopup(`
      <b>${s.title}</b><br/>
      <button onclick="speak('${s.text}')">▶️ Audio starten</button>
    `);
});

// GPS
navigator.geolocation?.watchPosition(pos=>{
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  L.circleMarker([lat,lng]).addTo(map)
    .bindPopup("Du bist hier");
});
</script>

</body>
</html>
